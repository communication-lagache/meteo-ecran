<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeau Météo 4K iiSignage</title>
    <style>
        /* Configuration de la page globale */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 3840px; /* Force la largeur exacte de votre écran 4K */
            height: 100%;
            overflow: hidden; 
            background: transparent; 
        }

        /* Conteneur du bandeau haut */
        .bandeau-meteo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 3840px;
            height: 160px; /* Hauteur idéale pour un bandeau en 4K (ajustable selon vos besoins) */
            z-index: 9999;
        }

        /* Optimisation du widget WeatherWidget.io */
        .weatherwidget-io {
            display: block;
            width: 100% !important;
            height: 100% !important;
            padding: 0;
            margin: 0;
            /* Optionnel : Augmente la taille globale des éléments si écrit trop petit sur la TV */
            transform: scale(1); 
            transform-origin: top left;
        }
    </style>
</head>
<body>

    <div class="bandeau-meteo-container">
        <a class="weatherwidget-io" 
           href="https://forecast7.com/fr/46d232d21/france/" 
           data-label_1="FRANCE" 
           data-label_2="METEO" 
           data-icons="Climacons Animated" 
           data-theme="weather_one">
           FRANCE WEATHER
        </a>
    </div>

    <script>
    !function(d,s,id){
        var js,fjs=d.getElementsByTagName(s)[0];
        if(!d.getElementById(id)){
            js=d.createElement(s);
            js.id=id;
            js.src='https://weatherwidget.io/js/widget.min.js';
            fjs.parentNode.insertBefore(js,fjs);
        }
    }(document,'script','weatherwidget-io-js');
    </script>

</body>
</html>
