<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeau Météo Responsive iiSignage</title>
    <style>
        /* Supprime les marges de l'écran */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background: transparent; 
        }

        /* Le conteneur s'adapte automatiquement à la largeur imposée par iiSignage */
        .bandeau-meteo-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px; /* Le bandeau fera 110px de haut, peu importe la largeur de la zone */
            z-index: 9999;
        }

        /* Le widget remplit le conteneur */
        .weatherwidget-io {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="bandeau-meteo-container">
        <a class="weatherwidget-io" 
           href="https://forecast7.com/fr/46d232d21/france/" 
           data-label_1="FRANCE" 
           data-label_2="METEO" 
           data-icons="Climacons Animated" 
           data-theme="weather_one">
           FRANCE WEATHER
        </a>
    </div>

    <script>
    !function(d,s,id){
        var js,fjs=d.getElementsByTagName(s)[0];
        if(!d.getElementById(id)){
            js=d.createElement(s);
            js.id=id;
            js.src='https://weatherwidget.io/js/widget.min.js';
            fjs.parentNode.insertBefore(js,fjs);
        }
    }(document,'script','weatherwidget-io-js');
    </script>

</body>
</html>
